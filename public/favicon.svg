<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#1A1A1E"/>
  <!-- Cassette shell -->
  <rect x="3" y="8" width="26" height="18" rx="3" fill="#C4A265"/>
  <rect x="3" y="8" width="26" height="18" rx="3" fill="none" stroke="#8B6914" stroke-width="0.8"/>
  <!-- Window -->
  <rect x="8" y="11" width="16" height="9" rx="1.5" fill="#0e0e0e"/>
  <!-- Left reel -->
  <circle cx="13" cy="15.5" r="3" fill="#1a1a1a" stroke="#444" stroke-width="0.6"/>
  <circle cx="13" cy="15.5" r="1.2" fill="#333"/>
  <!-- Right reel -->
  <circle cx="19" cy="15.5" r="3" fill="#1a1a1a" stroke="#444" stroke-width="0.6"/>
  <circle cx="19" cy="15.5" r="1.2" fill="#333"/>
  <!-- Tape strip between reels -->
  <line x1="16" y1="17.5" x2="16" y2="17.5" stroke="#111" stroke-width="1.5"/>
  <rect x="15" y="17" width="2" height="1" fill="#111"/>
  <!-- Bottom slots -->
  <rect x="10" y="22" width="4" height="2" rx="0.5" fill="rgba(0,0,0,0.4)"/>
  <rect x="15" y="22" width="4" height="2" rx="0.5" fill="rgba(0,0,0,0.4)"/>
  <!-- Label stripe accent -->
  <rect x="3" y="8" width="26" height="2.5" rx="3" fill="#00F5FF" opacity="0.6"/>
</svg>
